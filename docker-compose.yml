# adapte du docker-compose officiel apache airflow 3.3.0 (guide "Running Airflow in Docker")
# je passe en LocalExecutor avec une metadata db postgres dediee, du coup redis et les workers celery degagent
# j'ajoute mes services a moi : postgres metier (gold + meta), minio (bronze + silver) et metabase pour le dashboard

x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.3.0}
  env_file:
    - path: ${ENV_FILE_PATH:-.env}
      required: false
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # mon code metier vit dans include/, je le rends importable
    PYTHONPATH: /opt/airflow
    # acces au postgres metier et a minio depuis les taches
    QUALITE_AIR_PG_DSN: postgresql://qualite_air:qualite_air@postgres-metier:5432/qualite_air
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: qualite_air
    MINIO_SECRET_KEY: qualite_air_minio
    MINIO_SECURE: 'false'
    # installe au demarrage des conteneurs, suffisant pour un environnement de tp
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-minio==7.2.15 pandas==2.2.3 pyarrow==18.1.0}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/include:/opt/airflow/include
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres-airflow:
      condition: service_healthy
    postgres-metier:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # metadata db d'airflow, base dediee, jamais melangee avec le metier
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # base metier : schemas gold (etoile) et meta (logs), plus la base applicative de metabase
  postgres-metier:
    image: postgres:16
    environment:
      POSTGRES_USER: qualite_air
      POSTGRES_PASSWORD: qualite_air
      POSTGRES_DB: qualite_air
    ports:
      - "5433:5432"
    volumes:
      - postgres-metier-volume:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "qualite_air"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # stockage objet : bucket bronze (json brut) et silver (parquet nettoye + quarantaine)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qualite_air
      MINIO_ROOT_PASSWORD: qualite_air_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-volume:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: always

  # cree les deux buckets au demarrage puis s'arrete
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 qualite_air qualite_air_minio &&
      mc mb --ignore-existing local/bronze &&
      mc mb --ignore-existing local/silver
      "

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: qualite_air
      MB_DB_PASS: qualite_air
      MB_DB_HOST: postgres-metier
    depends_on:
      postgres-metier:
        condition: service_healthy
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
        echo "je pose les variables du pipeline, modifiables ensuite dans l'ui admin > variables"
        /entrypoint airflow variables set qualite_air_api_url "https://data.sensor.community/airrohr/v1/filter/country=FR"
        /entrypoint airflow variables set conformite_seuil_pct "50"
        /entrypoint airflow variables set qualite_air_pm_max "999"
        /entrypoint airflow variables set qualite_air_fraicheur_max_minutes "60"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

volumes:
  postgres-airflow-volume:
  postgres-metier-volume:
  minio-volume:
